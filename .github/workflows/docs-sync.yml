name: Documentation Drift Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  docs-drift:
    name: Check documentation drift
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get changed files
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed_files.txt
          echo "Changed files:"
          cat /tmp/changed_files.txt

      - name: Run documentation drift check
        id: drift
        env:
          CHANGED_FILES_PATH: /tmp/changed_files.txt
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          python scripts/check_doc_drift.py 2>&1 | tee /tmp/drift_report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Read drift report
        id: report
        run: |
          REPORT=$(cat /tmp/drift_report.txt)
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.report.outputs.report }}`;
            const body = [
              "## 📋 Documentation Drift Report",
              "",
              report,
              "",
              "---",
              "_Generated by [repo-documentation agent](agents/15-platform-devsecops/repo-documentation/AGENT.md). " +
              "Every PR is checked to prevent documentation from drifting from code._"
            ].join("\n");

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === "github-actions[bot]" &&
              c.body.includes("Documentation Drift Report")
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail on critical drift
        run: |
          python scripts/check_doc_drift.py --critical-only
        env:
          CHANGED_FILES_PATH: /tmp/changed_files.txt
