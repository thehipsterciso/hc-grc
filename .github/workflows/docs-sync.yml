name: Documentation Drift Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  docs-drift:
    name: Check documentation drift
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2 — SHA-pinned; do not replace with mutable tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Python
        # actions/setup-python v5.3.0 — SHA-pinned
        uses: actions/setup-python@0b93645e9fea7318167b71adb9f26de50d71b3c7
        with:
          python-version: "3.11"

      - name: Get changed files
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed_files.txt
          echo "Changed files:"
          cat /tmp/changed_files.txt

      - name: Run documentation drift check
        id: drift
        continue-on-error: true  # must continue so the PR comment step always runs
        env:
          CHANGED_FILES_PATH: /tmp/changed_files.txt
        run: |
          python scripts/check_doc_drift.py 2>&1 | tee /tmp/drift_report.txt

      - name: Post PR comment
        # actions/github-script v7.0.1 — SHA-pinned
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const fs = require('fs');
            // Read report from file — do NOT interpolate workflow outputs directly into
            // script body; that creates an expression injection vector via crafted PR paths.
            const report = fs.readFileSync('/tmp/drift_report.txt', 'utf8').trim() || 'No output.';

            const body = [
              "## 📋 Documentation Drift Report",
              "",
              report,
              "",
              "---",
              "_Generated by [repo-documentation agent](agents/15-platform-devsecops/repo-documentation/AGENT.md). " +
              "Every PR is checked to prevent documentation from drifting from code. " +
              "Run `make check-docs` locally before pushing._"
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === "github-actions[bot]" &&
              c.body.includes("Documentation Drift Report")
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail on critical drift
        env:
          CHANGED_FILES_PATH: /tmp/changed_files.txt
        run: |
          python scripts/check_doc_drift.py --critical-only
