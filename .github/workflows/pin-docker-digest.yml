name: pin-docker-digest

# Manual workflow: pull python:3.11-slim, retrieve its digest, and open a PR
# that pins the Dockerfile FROM line to that exact digest.
# This is a deliberate human action — see docs/REPRODUCIBILITY.md.
on:
  workflow_dispatch:

jobs:
  pin-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Pull python:3.11-slim and get digest
        id: digest
        run: |
          docker pull python:3.11-slim
          DIGEST=$(docker inspect python:3.11-slim --format='{{index .RepoDigests 0}}')
          echo "digest=$DIGEST"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          # Extract only the sha256 portion for the FROM line
          SHA256=$(echo "$DIGEST" | sed 's/.*@//')
          echo "sha256=$SHA256"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Update Dockerfile FROM line with pinned digest
        run: |
          SHA256="${{ steps.digest.outputs.sha256 }}"
          # Replace the unpinned FROM line with a pinned one
          sed -i "s|^FROM python:3.11-slim$|FROM python:3.11-slim@${SHA256}|" repro/Dockerfile
          echo "Updated FROM line:"
          grep "^FROM" repro/Dockerfile

      - name: Create PR with pinned digest
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "chore/pin-docker-digest-${{ github.run_number }}"
          commit-message: "chore: pin repro/Dockerfile to python:3.11-slim@${{ steps.digest.outputs.sha256 }}"
          title: "chore: pin Dockerfile base image digest"
          body: |
            Pins `repro/Dockerfile` FROM line to the current digest of `python:3.11-slim`.

            **Digest:** `${{ steps.digest.outputs.digest }}`

            This was generated by the `pin-docker-digest` workflow on ${{ github.event.repository.full_name }}.
            Review the digest, verify it matches a trusted image, then merge.

            After merging, recompute `repro/smoke/expected_output.sha256` if the base image changed
            behavior (see docs/REPRODUCIBILITY.md).
          labels: "reproducibility,docker"
