# ─────────────────────────────────────────────────────────────────────────────
# HC-GRC local infrastructure stack (compute node, ADR-0014).
#
# Data-sovereign (ADR-0002): every service runs on-device and persists to a
# project-local, gitignored volume. Nothing leaves the machine.
#
# Runtime: Colima (headless Docker for Apple Silicon) — `colima start`, then
# `docker compose up -d`. Postgres, MLflow, and Phoenix are managed outside
# compose (Homebrew launchd / serverless SQLite / launchd LaunchAgent); see
# docs/architecture/INFRASTRUCTURE.md. This file currently provisions the
# vector store; additional containerized services can be added here.
# ─────────────────────────────────────────────────────────────────────────────

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: hcgrc-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP / REST API
      - "6334:6334"   # gRPC API
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      # Qdrant's image is distroless (no shell/curl); the Python client and
      # `docker compose ps` liveness are used instead. Kept minimal here.
      test: ["CMD-SHELL", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
